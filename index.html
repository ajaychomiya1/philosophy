<!DOCTYPE html>
<html>
<head>
  <title>Ajay Philosophy - Deep Questions & Answers</title>
  <meta name="description" content="Ajay Philosophy: Deep questions about God, truth, life with powerful answers.">
</head>
  <style>
    body { font-family: Arial; padding: 20px; }
    input { width: 100%; padding: 10px; margin-bottom: 20px; }
  </style>
</head>

<body>

<h1>Ask Philosophy</h1>

<input type="text" id="search" placeholder="Ask something..." onkeyup="searchQ()">

<div id="results"></div>

<script>
const data = [
  {
    q: "Does God exist?",
    a: "God is a concept created by human fear and desire..."
  },
  {
    q: "What is truth?",
    a: "Truth is beyond belief. It is direct experience..."
  },
  {
    q: "भगवान क्या है?",
    a: "भगवान मन की कल्पना है जो डर और इच्छा से पैदा होती है..."
  },
  {
    q: "सच क्या है?",
    a: "सच belief नहीं, सीधा अनुभव है..."
  },
  {
    q: "दुख क्यों होता है?",
    a: "दुख attachment और expectation से पैदा होता है..."
  }
];
function searchQ() {
  let input = document.getElementById("search").value.toLowerCase();
  let output = "";

  data.forEach(item => {
    let q = item.q.toLowerCase();
    let a = item.a.toLowerCase();

    if (q.includes(input) || a.includes(input)) {
      output += `<h3>${item.q}</h3><p>${item.a}</p>`;
    }
  });

  document.getElementById("results").innerHTML = output;
}
